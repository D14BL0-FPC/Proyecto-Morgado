app:
  name: webnest
  image:
    repository: franm88/pokeapinest
    tag: latest
    pullPolicy: Always
  # containerPort: 3001   
  container: 
    name: webnest
    port: 3000
    replicas: 3
  service:
    type: NodePort
    port: 80
    nodePort: 30022
    sshPort: 3456
    sshTargetPort: 3456
    sshNodePort: 30456
  ingress:
    host: api.vuelaguadalinfogarrucha.es
    port: 80

frontend:
  name: webnext
  image:
    repository: franm88/nextpoke
    tag: latest
    pullPolicy: Always
  container:
    name: webnext
    port: 3000
    replicas: 3
  service:
    type: NodePort
    port: 3000
    nodePort: 30023
    sshPort: 3457
    sshTargetPort: 3457
    sshNodePort: 30457
  ingress:
    host: vuelaguadalinfogarrucha.es
    port: 3000

postgres:
  name: postgres
  image:
    repository: franm88/postgres
    tag: "latest"
    pullPolicy: Always
  service:
    port: 5432
  auth:
    database: pokenest
    username: postgres
    password: usuario
  # Este es el volumen donde se guardarán los datos de PostgreSQL. Si quieres usar un volumen persistente
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: "local-path"   # pon aquí tu storageClass si quieres fijarla
